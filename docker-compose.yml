version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: posts_postgres_db
    restart: always
    environment:
      POSTGRES_DB: educational_posts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d educational_posts"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: posts_express_app
    restart: always
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=educational_posts
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=super_secret_key_change_me_in_production
      - JWT_EXPIRES_IN=24h
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
